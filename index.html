    if (fileId) return fileId;
    const f = await findFile(MAIN_NAME);
    fileId = f ? f.id : await createFile(MAIN_NAME);
    return fileId;
  }
  async function getVersion(){
    const res = await dfetch("https://www.googleapis.com/drive/v3/files/" + fileId + "?fields=version");
    const data = await res.json();
    return data.version || null;
  }
  async function download(){
    const res = await dfetch("https://www.googleapis.com/drive/v3/files/" + fileId + "?alt=media");
    if (!res.ok) return null;
    const text = await res.text();
    if (!text) return null;
    try { return JSON.parse(text); } catch(e){ return null; }
  }
  async function upload(id, obj){
    const res = await dfetch("https://www.googleapis.com/upload/drive/v3/files/" + id + "?uploadType=media&fields=version", {
      method: "PATCH", headers: { "Content-Type": "application/json" }, body: JSON.stringify(obj)
    });
    const data = await res.json();
    return data.version || null;
  }

  // ---- main-file model + merge ----
  function buildLocal(){
    return {
      rev: 0, lastWriteBy: deviceId, updatedAt: Date.now(),
      data: { properties: items.map(function(x){ return Object.assign({}, x); }) },
      cats: { list: cats.map(function(c){ return Object.assign({}, c); }), _updatedAt: window.__catsTs },
      settings: { density: density, sort: currentSort, dueDays: dueSoonDays, _updatedAt: window.__settingsTs },
      deleted: Object.assign({}, deleted)
    };
  }
  function mergeMain(local, remote){
    if (!remote || !remote.data) return local;
    const out = { rev: 0, lastWriteBy: deviceId, updatedAt: Date.now(), data: {}, cats: null, settings: null, deleted: {} };
    // tombstones: union, later deletion time wins
    const del = {}; const ld = local.deleted || {}, rd = remote.deleted || {};
    for (const k in ld) del[k] = ld[k];
    for (const k in rd) del[k] = Math.max(del[k] || 0, rd[k]);
    // properties: union by id, newer updatedAt wins, then drop if tombstoned after last update
    const byId = {}; const lp = (local.data && local.data.properties) || [], rp = (remote.data && remote.data.properties) || [];
    lp.concat(rp).forEach(function(r){ if (!r || r.id == null) return; if (!byId[r.id] || (r.updatedAt||0) > (byId[r.id].updatedAt||0)) byId[r.id] = r; });
    const props = [];
    for (const id in byId){ const r = byId[id]; const dt = del[id]; if (dt && dt >= (r.updatedAt||0)) continue; props.push(r); }
    out.data.properties = props; out.deleted = del;
    // categories: whole-list last-write-wins
    const lc = local.cats || { list: [], _updatedAt: 0 }, rc = remote.cats || { list: [], _updatedAt: 0 };
    out.cats = ((lc._updatedAt||0) >= (rc._updatedAt||0)) ? lc : rc;
    // single-value settings: last-write-wins
    const ls = local.settings || { _updatedAt: 0 }, rs = remote.settings || { _updatedAt: 0 };
    out.settings = ((ls._updatedAt||0) >= (rs._updatedAt||0)) ? ls : rs;
    return out;
  }
  function sortKeys(o){ const r = {}; Object.keys(o).sort().forEach(function(k){ r[k] = o[k]; }); return r; }
  function canonical(m){
    if (!m) return "";
    const props = (((m.data||{}).properties)||[]).slice().sort(function(a,b){ return String(a.id).localeCompare(String(b.id)); }).map(sortKeys);
    const del = m.deleted || {}; const dk = Object.keys(del).sort();
    const catList = ((m.cats||{}).list || []).slice().sort(function(a,b){ return String(a.key).localeCompare(String(b.key)); }).map(sortKeys);
    const s = m.settings || {};
    return JSON.stringify({ p: props, d: dk.map(function(k){ return [k, del[k]]; }), c: [catList, (m.cats||{})._updatedAt||0], s: sortKeys(s) });
  }
  function applyMerged(merged){
    items = (merged.data.properties || []).map(function(d){ return Object.assign({}, d, { id: d.id || uid(), updatedAt: d.updatedAt || BASE_TS }); });
    saveItems();
    deleted = merged.deleted || {}; saveDeleted();
    if (merged.cats && Array.isArray(merged.cats.list) && merged.cats.list.length){
      cats = merged.cats.list.map(function(c){ return Object.assign({}, c); });
      window.__catsTs = merged.cats._updatedAt || window.__catsTs; saveTs("cats", window.__catsTs);
      saveCats();
    }
    if (merged.settings && merged.settings._updatedAt){
      const s = merged.settings;
      if (s.density){ density = s.density; if (storageOK){ try { localStorage.setItem("property_app_density_v1", density); } catch(e){} } }
      if (s.sort){ currentSort = s.sort; saveSort(); }
      if (typeof s.dueDays === "number"){ dueSoonDays = s.dueDays; saveDueDays(); }
      window.__settingsTs = s._updatedAt || window.__settingsTs; saveTs("settings", window.__settingsTs);
    }
    // re-render UI to reflect merged state
    renderCover(); renderTabs(); renderCatOptions();
    if (typeof renderSortOptions === "function"){ renderSortOptions(); sortTxt.textContent = (SORTS.find(function(x){ return x.key === currentSort; }) || SORTS[0]).label; }
    if (typeof renderDueDays === "function") renderDueDays();
    setDensity(density);
  }

  // ---- daily snapshot (insurance; keeps one per day) ----
  async function maybeSnapshot(obj){
    try {
      const day = new Date().toISOString().slice(0,10);
      const name = "sync-backup-" + day + ".json";
      const existing = await findFile(name);
      if (existing) return;
      const id = await createFile(name);
      await upload(id, obj);
    } catch(e){}
  }

  // ---- status UI ----
  function setStatus(text, kind){
    const st = document.getElementById("gStatus"), dot = document.getElementById("gDot");
    if (st) st.textContent = text;
    if (dot) dot.className = "sync-dot" + (kind ? " " + kind : "");
  }
  function hhmm(){ try { return new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }); } catch(e){ return ""; } }
  window.renderSyncCard = function(){
    const off = document.getElementById("syncBoxOff"), on = document.getElementById("syncBoxOn");
    if (!off || !on) return;
    if (syncConnected){
      off.style.display = "none"; on.style.display = "";
      const em = document.getElementById("gEmail"); if (em) em.textContent = syncEmail || "已連結";
      const b = document.getElementById("gSyncNow"); if (b) b.textContent = needReauth ? "重新連結 Google" : "立即同步";
    } else { off.style.display = ""; on.style.display = "none"; }
  };

  // ---- core two-way sync ----
  async function syncNow(){
    if (!syncConnected || inFlight) return;
    inFlight = true; setStatus("同步中…", "busy");
    try {
      await ensureToken();
      await ensureFileId();
      let tries = 0, pushed = null;
      while (tries < 3){
        tries++;
        const remote = await download();
        const local = buildLocal();
        const merged = mergeMain(local, remote);
        applyMerged(merged);
        const needPush = !remote || canonical(merged) !== canonical(remote);
        if (!needPush){ lastVersion = await getVersion(); break; }
        merged.rev = ((remote && remote.rev) || 0) + 1; merged.lastWriteBy = deviceId; merged.updatedAt = Date.now();
        const newVer = await upload(fileId, merged);
        const afterVer = await getVersion();
        pushed = merged;
        if (afterVer && newVer && afterVer === newVer){ lastVersion = afterVer; break; }
        // else someone wrote concurrently → loop and re-merge
      }
      if (pushed) maybeSnapshot(pushed);
      setStatus("已同步 · " + hhmm(), "ok");
    } catch (e){
      if (e && (e.error === "access_denied" || e.error === "interaction_required" || e.error === "login_required" || e.message === "gis")){
        needReauth = true; setStatus("需要重新連結", "warn"); window.renderSyncCard();
      } else {
        setStatus("同步失敗，稍後重試", "warn");
      }
    } finally { inFlight = false; }
  }
  window.__syncNow = syncNow;

  function startPolling(){
    stopPolling();
    pollTimer = setInterval(async function(){
      if (!syncConnected || document.hidden || inFlight || needReauth) return;
      try { await ensureFileId(); const v = await getVersion(); if (v && v !== lastVersion) syncNow(); } catch(e){}
    }, POLL_MS);
  }
  function stopPolling(){ if (pollTimer){ clearInterval(pollTimer); pollTimer = null; } }

  // ---- connect / disconnect ----
  async function connect(){
    try {
      initClient();
      setStatus("連結中…", "busy");
      await requestToken(true);
      const res = await dfetch("https://www.googleapis.com/oauth2/v2/userinfo");
      const info = await res.json();
      syncEmail = info.email || "已連結"; syncConnected = true; needReauth = false;
      saveAuth(); window.renderSyncCard();
      await syncNow();
      startPolling();
      toast("已連結 Google 雲端");
    } catch (e){
      setStatus("連結失敗", "warn");
    }
  }
  function disconnect(){
    askConfirm("解除 Google 連結？", "只會停止這台裝置的同步，雲端資料不會被刪除。", function(){
      if (accessToken && window.google && google.accounts && google.accounts.oauth2){ try { google.accounts.oauth2.revoke(accessToken, function(){}); } catch(e){} }
      syncConnected = false; syncEmail = null; accessToken = null; tokenExpiry = 0; fileId = null; lastVersion = null; needReauth = false;
      stopPolling(); saveAuth(); window.renderSyncCard();
      toast("已解除連結");
    });
  }

  // ---- wire buttons + init ----
  document.getElementById("gConnect").addEventListener("click", connect);
  document.getElementById("gDisconnect").addEventListener("click", disconnect);
  document.getElementById("gSyncNow").addEventListener("click", function(){ if (needReauth) connect(); else syncNow(); });
  document.addEventListener("visibilitychange", function(){ if (!document.hidden && syncConnected && !needReauth) syncNow(); });

  whenGis(function(){
    initClient();
    const auth = loadAuth();
    if (auth && auth.connected){
      syncConnected = true; syncEmail = auth.email || null;
      window.renderSyncCard();
      syncNow().then(function(){ if (!needReauth) startPolling(); });
    } else {
      window.renderSyncCard();
    }
  });
})();
</script>
</body>
</html>
